<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Sesam ouvre toi !{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/collapse@3.x.x/dist/cdn.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="https://unpkg.com/htmx.org@1.9.10"></script>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body class="bg-gray-50 min-h-screen font-sans" x-data="{ syncing: false, syncLabel: '' }">

  <!-- Loading overlay sync -->
  <div x-show="syncing" x-transition.opacity
       class="fixed inset-0 z-[100] flex items-center justify-center bg-white/70 backdrop-blur-sm">
    <div class="flex flex-col items-center gap-3 bg-white border border-gray-200 rounded-2xl shadow-xl px-10 py-8">
      <svg class="w-8 h-8 text-indigo-500 animate-spin" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v4a4 4 0 00-4 4H4z"/>
      </svg>
      <span class="text-sm font-semibold text-gray-700" x-text="syncLabel"></span>
      <span class="text-xs text-gray-400">Calcul des relances GIE en cours…</span>
    </div>
  </div>

  <!-- Navigation -->
  <nav class="bg-white border-b border-gray-200 shadow-sm sticky top-0 z-50">
    <div class="w-full mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex items-center justify-between h-14">
        <div class="flex items-center gap-6">
          <a href="/" class="flex items-center gap-2 font-bold text-gray-900 text-lg">
            <img src="/static/logo.png" alt="SESAM" class="h-8 w-auto">
            <span>Sesam ouvre toi !</span>
          </a>
          <a href="/"
             class="text-sm font-medium {% if request.url.path == '/' %}text-indigo-600 border-b-2 border-indigo-600 pb-0.5{% else %}text-gray-600 hover:text-gray-900{% endif %} transition-colors">
            Dashboard
          </a>
          <a href="/tickets"
             class="text-sm font-medium {% if request.url.path.startswith('/tickets') %}text-indigo-600 border-b-2 border-indigo-600 pb-0.5{% else %}text-gray-600 hover:text-gray-900{% endif %} transition-colors">
            Tickets
          </a>
        </div>
        <div class="flex items-center gap-2">
          <a href="https://portail-support.sesam-vitale.fr/gsvextranet/#/requests/create?source=DEMANDE"
             target="_blank" rel="noopener noreferrer"
             class="flex items-center gap-1.5 text-sm text-white bg-indigo-600 hover:bg-indigo-700 rounded-lg px-3 py-1.5 transition-colors font-medium">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
            </svg>
            Nouvelle demande
          </a>
          <div class="relative" x-data="{ open: false }" @click.outside="open = false">
            <button @click="open = !open"
                    class="flex items-center justify-center w-8 h-8 text-gray-500 hover:text-gray-700 border border-gray-200 hover:border-gray-300 rounded-lg transition-colors"
                    title="Options de synchronisation">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
              </svg>
            </button>
            <div x-show="open" x-transition
                 class="absolute right-0 mt-1 w-48 bg-white border border-gray-200 rounded-lg shadow-lg z-50 py-1">
              <form method="POST" action="/refresh"
                    @submit="syncing = true; syncLabel = 'Synchronisation delta en cours…'">
                <button type="submit"
                        class="w-full flex items-center gap-2 px-3 py-2 text-sm text-gray-700 hover:bg-gray-50 text-left"
                        title="Détecte les changements de statut et récupère les nouveaux messages">
                  <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
                  </svg>
                  Sync delta
                </button>
              </form>
              <form method="POST" action="/refresh/full"
                    @submit="syncing = true; syncLabel = 'Synchronisation complète en cours…'">
                <button type="submit"
                        class="w-full flex items-center gap-2 px-3 py-2 text-sm text-red-600 hover:bg-red-50 text-left"
                        title="Recharge tous les tickets depuis le portail">
                  <svg class="w-4 h-4 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                  </svg>
                  Sync complet
                </button>
              </form>
              <div class="border-t border-gray-100 my-1"></div>
              <a href="/tickets/create"
                 class="w-full flex items-center gap-2 px-3 py-2 text-sm text-gray-400 hover:bg-gray-50 text-left"
                 title="Tester le formulaire de création interne (expérimental)">
                <svg class="w-4 h-4 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
                </svg>
                Formulaire interne (test)
              </a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </nav>

  <!-- Main content -->
  <main class="w-full mx-auto px-4 sm:px-6 lg:px-8 py-6">
    {% block content %}{% endblock %}
  </main>

</body>
</html>
