name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ['3.11', '3.12']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run tests
      run: |
        pytest tests/ -v --tb=short

    - name: Generate coverage report
      run: |
        pip install pytest-cov
        pytest tests/ --cov=. --cov-report=xml --cov-report=term

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        files: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

  release:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Bump patch version
      id: bump
      run: |
        VERSION=$(cat VERSION | tr -d '[:space:]')
        IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
        NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
        echo "$NEW_VERSION" > VERSION
        echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add VERSION
        git commit -m "chore: bump version $VERSION → $NEW_VERSION [skip ci]"
        git push

    - name: Build release zip
      run: bash package.sh --release

    - name: Publish GitHub Release (latest)
      uses: softprops/action-gh-release@v2
      with:
        tag_name: latest
        name: "v${{ steps.bump.outputs.new_version }}"
        prerelease: false
        files: |
          sesam-ticket-manager.zip
          sesam-ticket-manager.sha1
          setup.sh
          uninstall.sh
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
